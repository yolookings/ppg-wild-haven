<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Wild Haven — Cozy Creature Sanctuary</title>
  
  <!-- Preload Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #14171a; /* Backup dark color */
      background: radial-gradient(circle at center, #2e3b2e 0%, #171d17 100%);
      font-family: 'Outfit', 'Inter', sans-serif;
      color: #f7ede2;
    }

    #app-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* Elegant web frame details - only visible on larger screens */
    @media (min-width: 1025px) {
      body {
        padding: 20px;
        background: radial-gradient(circle at center, #2e4438 0%, #111a14 100%);
      }
      #app-container {
        width: 100%;
        height: 100%;
        max-width: 1280px;
        max-height: 720px;
        border-radius: 24px;
        border: 6px solid #4a3b2c; /* Wooden look */
        box-shadow: 
          0 0 0 10px #2a2015,
          0 30px 100px rgba(0, 0, 0, 0.8),
          inset 0 0 20px rgba(0, 0, 0, 0.6);
        overflow: hidden;
        margin: auto;
        position: absolute;
        top: 0; bottom: 0; left: 0; right: 0;
        background: #1a231e;
      }
    }

    /* Orientation warning for mobile portrait if it was strictly landscape, but brief says we must fully support portrait */
    #orientation-tip {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(10px);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      pointer-events: none;
      display: none;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 1000;
    }

    @media (max-width: 768px) and (orientation: portrait) {
      #orientation-tip {
        display: flex;
      }
    }
  </style>
  <script type="module" crossorigin src="./assets/index-ajnj5tOP.js"></script>
</head>
<body>
  <div id="app-container">
    <div id="game-container"></div>
    <div id="orientation-tip">
      🔄 Recommended: rotate for landscape view, or play in portrait mode!
    </div>
  </div>

</body>
</html>
